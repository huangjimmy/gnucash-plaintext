name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.distribution }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - distribution: 'GnuCash-510_Debian-13'
            base_image: 'debian:13'
            tag: 'latest'
          - distribution: 'GnuCash-413_Debian-12'
            base_image: 'debian:12'
            tag: 'debian12'
          - distribution: 'GnuCash-44_Debian-11'
            base_image: 'debian:11'
            tag: 'debian11'
          - distribution: 'GnuCash-38_Ubuntu-2004'
            base_image: 'ubuntu:20.04'
            tag: 'ubuntu20'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            -t gnucash-dev:${{ matrix.tag }} \
            .

      - name: Run tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            gnucash-dev:${{ matrix.tag }} \
            sh -c "cd /workspace && \
              python3 -m pip install -e '.[dev]' -q --break-system-packages && \
              pytest tests/ -v --tb=short"
        # Note: --break-system-packages is safe in Docker containers (isolated environment)

      - name: Run linting
        if: matrix.tag == 'latest'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            gnucash-dev:${{ matrix.tag }} \
            sh -c "cd /workspace && \
              python3 -m pip install -e '.[dev]' -q --break-system-packages && \
              ruff check ."
        # Note: --break-system-packages is safe in Docker (isolated environment)

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t gnucash-dev:latest .

      - name: Run tests with coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            gnucash-dev:latest \
            sh -c "cd /workspace && \
              python3 -m pip install -e '.[dev]' -q --break-system-packages && \
              pytest tests/ --cov=. --cov-report=xml --cov-report=term"
        # Note: --break-system-packages is safe in Docker (isolated environment)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t gnucash-dev:latest .

      - name: Run ruff check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            gnucash-dev:latest \
            sh -c "cd /workspace && \
              python3 -m pip install -e '.[dev]' -q --break-system-packages && \
              ruff check ."
        # Note: --break-system-packages is safe in Docker (isolated environment)
